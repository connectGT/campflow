name: Keep Supabase Alive

on:
  schedule:
    # Every Monday at 9am UTC (2:30pm IST) — prevents free-tier DB from pausing after 7 days inactivity
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -f "${{ secrets.CAMPFLOW_URL }}/api/health" \
            -H "User-Agent: keep-alive-bot/1.0" \
            || echo "Ping failed — check CAMPFLOW_URL secret"
